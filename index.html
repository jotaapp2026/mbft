ática","e":"Observações do AIT: 1. Condutor segurando mochila em uma das mãos. acordo com o art. 256 do CTB, a administrativa que traz a Considerando que a conduta inserida no campo destinado à de Esforço Legal, registrada na"},{"id":356,"c":"710-21","a":"Art. 244, VIII.","r":"Conduzir motocicleta, motoneta e ciclomotor transportando carga incompatível.","d":"Conduzir motocicleta, motoneta e ciclomotor transportando carga incompatível com suas especificações ou em desacordo com o previsto no § 2º do art. 139-A desta Lei.","n":"grave","i":"Condutor","p":"5","m":"R$ 195,23","k":"Possível sem abordagem. Exemplos do Campo de","w":["Motocicleta, motoneta, ou ciclomotor, transportando carga incompatível com as especificações regulamentadas pelo Contran.","Prestação do serviço de motofrete ou mototáxi transportando carga incompatível."],"x":["Motocicleta ou motoneta efetuando transporte dos seguintes tipos de cargas: 1.","combustível; 1.","produtos inflamáveis ou tóxicos; 1.","gás de cozinha ou galões de água mineral no carro lateral (sidecar) ou semirreboque, acima do permitido. 1."],"o":"1. Os dispositivos de transporte de cargas em motocicleta e motoneta poderão ser do tipo fechado (baú) ou aberto (grelha), alforjes, bolsas ou caixas laterais, desde que atendidas as dimensões máximas fixadas pelo Contran e as especificações do fabricante do veículo no tocante à instalação e ao peso máximo admissível. 2. Carga incompatível é aquela que excede os limites de peso, capacidade máxima ","e":"Observações do AIT: 1. Condutor transportando prancha de surf no veículo. 2. Motocicleta efetuando transporte não remunerado de carga, transportando extintores que ultrapassam os limites de largura e altura estabelecidos para o dispositivo. 3. Ciclom"},{"id":357,"c":"710-23","a":"Art. 244, VIII.","r":"Conduzir motoc/moton/ transportando carga em desacordo c/ § 2º do Art 139-A CTB.","d":"Conduzir motocicleta, motoneta e ciclomotor transportando carga incompatível com suas especificações ou // ESTADO
// ═══════════════════════════════════════════
let query = '';
let filt = 'all';
let navMode = 'all'; // 'all' | 'gravissima' | 'favs'
let favs = new Set(JSON.parse(localStorage.getItem('mbf_favs') || '[]'));
let curFont = parseInt(localStorage.getItem('mbf_font') || '14');
let isDark = localStorage.getItem('mbf_theme') === 'dark';

// ═══════════════════════════════════════════
// NATUREZA
// ═══════════════════════════════════════════
const NAT_LABEL = {
  gravissima: 'Gravíssima', grave: 'Grave',
  media: 'Média', leve: 'Leve', especial: 'Especial'
};

// ═══════════════════════════════════════════
// FILTRO / BUSCA
// ═══════════════════════════════════════════
function getFiltered() {
  const q = query.toLowerCase().trim();
  return DB.filter(f => {
    // Nav mode
    if (navMode === 'gravissima' && f.n !== 'gravissima') return false;
    if (navMode === 'favs' && !favs.has(f.c)) return false;
    // Filtro gravidade
    if (filt !== 'all' && f.n !== filt) return false;
    // Busca
    if (!q) return true;
    return (f.r && f.r.toLowerCase().includes(q)) ||
           (f.a && f.a.toLowerCase().includes(q)) ||
           (f.c && f.c.toLowerCase().includes(q)) ||
           (f.d && f.d.toLowerCase().includes(q)) ||
           (f.w && f.w.some(w => w.toLowerCase().includes(q))) ||
           (f.x && f.x.some(w => w.toLowerCase().includes(q))) ||
           (f.o && f.o.toLowerCase().includes(q));
  });
}

// ═══════════════════════════════════════════
// HIGHLIGHT
// ═══════════════════════════════════════════
function hl(text, q) {
  if (!q || !text) return text || '';
  const r = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(r, '<mark>$1</mark>');
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const filtered = getFiltered();
  const q = query.toLowerCase().trim();

  // Update count
  const countEl = document.getElementById('rc');
  countEl.textContent = filtered.length;

  // Limpar button
  const ri = document.getElementById('resultInfo');
  const existing = ri.querySelector('.limpar');
  if (q && !existing) {
    const btn = document.createElement('button');
    btn.className = 'limpar'; btn.textContent = 'Limpar busca';
    btn.onclick = clearSearch;
    ri.appendChild(btn);
  } else if (!q && existing) existing.remove();

  if (filtered.length === 0) {
    list.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(f => {
    const isFav = favs.has(f.c);
    const autuar0 = f.w && f.w.length ? f.w[0] : null;
    const multa = f.m && f.m !== '—' ? f.m : null;
    return `<div class="card" onclick="openModal('${f.c}')">
      <div class="card-top">
        <span class="card-code">${hl(f.c, q)}</span>
        <span class="nat-tag nat-${f.n}">${NAT_LABEL[f.n] || f.n}</span>
        ${multa ? `<span class="card-multa">💰 ${multa}</span>` : ''}
        <button class="fav-btn ${isFav ? 'on' : ''}" onclick="toggleFav(event,'${f.c}')" title="Favoritar">
          ${isFav ? '⭐' : '☆'}
        </button>
      </div>
      <div class="card-art">${hl(f.a || '', q)}</div>
      <div class="card-title">${hl(f.r, q)}</div>
      ${autuar0 ? `<div class="autuar-preview">
        <div class="autuar-preview-title">ⓘ QUANDO AUTUAR</div>
        <div class="autuar-preview-txt">${hl(autuar0, q)}</div>
      </div>` : ''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(codigo) {
  const f = DB.find(x => x.c === codigo);
  if (!f) return;
  const q = query.toLowerCase().trim();
  const isFav = favs.has(f.c);

  document.getElementById('mhdr').innerHTML = `
    <div class="modal-code-row">
      <span class="modal-code">${f.c}</span>
      <span class="nat-tag nat-${f.n}">${NAT_LABEL[f.n] || f.n}</span>
      <button class="fav-btn ${isFav?'on':''}" onclick="toggleFav(event,'${f.c}',true)" style="margin-left:auto">
        ${isFav ? '⭐' : '☆'}
      </button>
    </div>
    <div class="modal-title">${f.r}</div>
    <div class="modal-tags">
      ${f.p && /\d/.test(f.p) ? `<span class="mtag">🎯 ${f.p.match(/\d+/)[0]} pontos</span>` : (f.p ? `<span class="mtag">🎯 ${f.p}</span>` : '')}
      ${f.m && f.m !== '—' ? `<span class="mtag verde">💰 ${f.m}</span>` : ''}
      ${f.i ? `<span class="mtag">👤 ${f.i}</span>` : ''}
      ${f.k ? `<span class="mtag">📋 ${f.k.substring(0,40)}</span>` : ''}
    </div>`;

  let html = '';
  if (f.d) html += `<div class="sec-title">📄 Tipificação completa</div><div class="desc-box">${f.d}</div>`;

  if (f.w && f.w.length) {
    html += `<div class="sec-title">✅ Quando Autuar</div>
    <div class="autuar-full">
      ${f.w.map(w => `<div class="autuar-item"><span class="autuar-bullet">›</span><span>${hl(w,q)}</span></div>`).join('')}
    </div>`;
  }
  if (f.x && f.x.length) {
    html += `<div class="sec-title">🚫 Quando NÃO Autuar</div>
    <div class="nao-box">
      ${f.x.map(w => `<div class="nao-item">› ${hl(w,q)}</div>`).join('')}
    </div>`;
  }
  if (f.o && f.o.trim().length > 20) {
    html += `<div class="sec-title">📋 Definições e Procedimentos</div><div class="obs-box">${f.o}</div>`;
  }
  if (f.e && f.e.trim().length > 20) {
    html += `<div class="sec-title">📝 Exemplos para o AIT</div><div class="ait-box">${f.e}</div>`;
  }
  html += `<button class="modal-close" onclick="closeModal()">✕ Fechar</button>`;

  document.getElementById('mbdy').innerHTML = html;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow = '';
}
function closeIfBg(e) { if (e.target === document.getElementById('ov')) closeModal(); }

// ═══════════════════════════════════════════
// FAVORITOS
// ═══════════════════════════════════════════
function toggleFav(e, codigo, inModal = false) {
  e.stopPropagation();
  if (favs.has(codigo)) favs.delete(codigo);
  else favs.add(codigo);
  localStorage.setItem('mbf_favs', JSON.stringify([...favs]));
  render();
  if (inModal) openModal(codigo);
}

// ═══════════════════════════════════════════
// BUSCA E FILTROS
// ═══════════════════════════════════════════
document.getElementById('q').addEventListener('input', function() {
  query = this.value;
  document.getElementById('clrBtn').classList.toggle('show', query.length > 0);
  // Limpar chip ativo
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  render();
});

function clearSearch() {
  document.getElementById('q').value = '';
  query = '';
  document.getElementById('clrBtn').classList.remove('show');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('q').focus();
  render();
}

function setChip(q) {
  const inp = document.getElementById('q');
  if (inp.value.toLowerCase() === q.toLowerCase()) {
    // Toggle off
    clearSearch(); return;
  }
  inp.value = q; query = q;
  document.getElementById('clrBtn').classList.add('show');
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.getAttribute('onclick').includes("'" + q + "'"));
  });
  render();
}

// Filtros de gravidade
document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fb').forEach(b => {
      b.className = 'fb';
    });
    filt = this.dataset.f;
    const cls = filt === 'all' ? 'on-all' :
                filt === 'gravissima' ? 'on-grav' :
                filt === 'grave' ? 'on-grv' :
                filt === 'media' ? 'on-med' : 'on-lev';
    this.classList.add(cls);
    render();
  });
});

// ═══════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════
function setNav(mode) {
  navMode = mode;
  filt = 'all';
  document.querySelectorAll('.fb').forEach(b => { b.className = 'fb'; });
  document.querySelector('.fb[data-f="all"]').classList.add('on-all');
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  const map = { all: 'bnTodos', gravissima: 'bnGrav', favs: 'bnFav' };
  document.getElementById(map[mode]).classList.add('active');
  render();
}

// ═══════════════════════════════════════════
// FONTE
// ═══════════════════════════════════════════
function applyFont(val) {
  val = Math.max(11, Math.min(20, val));
  curFont = val;
  document.documentElement.style.fontSize = val + 'px';
  document.documentElement.style.setProperty('--fs', val + 'px');
  localStorage.setItem('mbf_font', val);
}
function changeFont(delta) { applyFont(curFont + delta); }

// ═══════════════════════════════════════════
// TEMA
// ═══════════════════════════════════════════
function applyTheme() {
  if (isDark) {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').textContent = '🌙';
  } else {
    document.body.classList.remove('dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('mbf_theme', isDark ? 'dark' : 'light');
  applyTheme();
  // Atualizar theme-color do PWA
  const meta = document.getElementById('themeColorMeta');
  if (meta) meta.setAttribute('content', isDark ? '#0f1117' : '#1d4ed8');
}

// Swipe para fechar modal
let ty0 = 0;
document.querySelector('.modal').addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; });
document.querySelector('.modal').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - ty0 > 80) closeModal();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
applyFont(curFont);
applyTheme();
render();
</script>

<script>
// ═══════════════════════════════════════════
// PWA — SERVICE WORKER + INSTALL PROMPT
// ═══════════════════════════════════════════
(function() {
  // Registrar Service Worker via Blob (funciona em arquivo local)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW registrado:', reg.scope);
    }).catch(err => {
      // Falha silenciosa — app funciona normalmente sem SW
      console.log('SW não disponível:', err.message);
    });
  }

  // Prompt de instalação (Android Chrome)
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar banner de instalação
    showInstallBanner();
  });

  function showInstallBanner() {
    // Não mostrar se já instalado ou se usuário já fechou
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    if (sessionStorage.getItem('mbf_install_dismissed')) return;

    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.innerHTML = `
      <div style="
        position:fixed;bottom:80px;left:12px;right:12px;z-index:500;
        background:#1d4ed8;color:#fff;border-radius:14px;
        padding:14px 16px;display:flex;align-items:center;gap:12px;
        box-shadow:0 8px 30px rgba(29,78,216,0.5);
        animation:slideUpBanner .3s ease;
      ">
        <div style="font-size:2rem;flex-shrink:0">🚦</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:0.95rem">Instalar MBFT 2022</div>
          <div style="font-size:0.8rem;opacity:.85;margin-top:2px">Acesse como app, funciona offline</div>
        </div>
        <button onclick="installApp()" style="
          background:#fff;color:#1d4ed8;border:none;border-radius:8px;
          padding:8px 14px;font-weight:700;font-size:0.85rem;cursor:pointer;
          font-family:'Dubai',sans-serif;flex-shrink:0;
        ">Instalar</button>
        <button onclick="dismissInstall()" style="
          background:none;border:none;color:rgba(255,255,255,0.7);
          font-size:1.3rem;cursor:pointer;padding:4px;line-height:1;
        ">✕</button>
      </div>`;

    const style = document.createElement('style');
    style.textContent = '@keyframes slideUpBanner{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}';
    document.head.appendChild(style);
    document.body.appendChild(banner);
  }

  window.installApp = async function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    const banner = document.getElementById('installBanner');
    if (banner) banner.remove();
    if (outcome === 'accepted') {
      console.log('App instalado!');
    }
  };

  window.dismissInstall = function() {
    sessionStorage.setItem('mbf_install_dismissed', '1');
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.animation = 'slideUpBanner .2s ease reverse';
    setTimeout(() => { if (banner) banner.remove(); }, 200);
  };

  // Detectar se já está rodando como PWA instalado
  if (window.matchMedia('(display-mode: standalone)').matches) {
    document.title = 'MBFT 2022';
    console.log('Rodando como PWA instalado ✅');
  }
})();
</script>

</body>
